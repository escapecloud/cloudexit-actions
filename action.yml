name: "GitHub Action for cloudexit"
description: "Run cloudexit assessments in GitHub Actions"
author: "EscapeCloud"

inputs:
  version:
    description: "cloudexit version tag (e.g: v1.1.1)"
    required: false
    default: "v1.1.1"
  provider:
    description: "Cloud Provider: aws or azure"
    required: true
  auth-mode:
    description: "Authentication mode: static or oidc"
    required: false
    default: "static"
  exit-strategy:
    description: "Exit Strategy: 1 (Repatriation) or 3 (Alternate Cloud)"
    required: true
  assessment-type:
    description: "Assessment Type: 1 (Basic) or 2 (Standard)"
    required: true
  host:
    description: "Optional EscapeCloud Platform host. Empty means offline mode."
    required: false
    default: ""
  key:
    description: "Optional EscapeCloud Platform key. Empty means offline mode."
    required: false
    default: ""

outputs:
  report-dir:
    description: "Path to generated reports directory"

runs:
  using: "docker"
  image: "Dockerfile"

branding:
  icon: "download-cloud"
  color: "gray-dark"
